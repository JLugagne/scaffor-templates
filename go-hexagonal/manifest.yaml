    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files:
      - source: internal/context/inbound/grpc/converters/entity.go.tmpl
        destination: internal/{{ .Context }}/inbound/grpc/converters/{{ .Entity | lower }}.go
    hint: |
      gRPC converters for {{ .Entity }} added.

      Created:
        internal/{{ .Context }}/inbound/grpc/converters/{{ .Entity | lower }}.go — proto <-> domain converters

  - command: add_grpc_handler
    description: Add both gRPC command and query handlers for an entity with converters
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files: []
    post_commands:
      - add_grpc_commands
      - add_grpc_queries
      - add_grpc_converter
    hint: |
      Full gRPC handler for {{ .Entity }} added (commands + queries + converters).

  - command: add_grpc_proto
    description: Add a proto file for a bounded context
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
    files:
      - source: pkg/context/grpc/proto/context.proto.tmpl
        destination: pkg/{{ .Context }}/grpc/proto/{{ .Context }}.proto
    hint: |
      Proto file for {{ .Context }} added.

      Created:
        pkg/{{ .Context }}/grpc/proto/{{ .Context }}.proto — proto definitions (generated Go code goes to pkg/{{ .Context }}/grpc/)

      NEXT STEP — generate Go code:
        protoc --go_out=. --go-grpc_out=. pkg/{{ .Context }}/grpc/proto/{{ .Context }}.proto

  # ──────────────────────────────────────────────
  # CLI INBOUND — cobra command handlers
  # ──────────────────────────────────────────────
  - command: add_cli_commands
    description: Add CLI command handlers (write operations) for an entity using Cobra
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files:
      - source: internal/context/inbound/cli/commands/entity.go.tmpl
        destination: internal/{{ .Context }}/inbound/cli/commands/{{ .Entity | lower }}.go
    hint: |
      CLI commands for {{ .Entity }} added.

      Created:
        internal/{{ .Context }}/inbound/cli/commands/{{ .Entity | lower }}.go — create, update, delete cobra sub-commands

      NEXT STEPS:
        1. Bind cobra flags to request fields inside createCmd() and updateCmd() (see TODO comments)
        2. Implement handler logic (converters + usecase calls) in each RunE
        3. Wire in cmd/{{ .Context }}-cli/main.go:
             clicommands.Setup{{ .Entity }}Cmds(root, a)
        4. Test: go run ./cmd/{{ .Context }}-cli {{ .Entity | lower }} create --help

  - command: add_cli_queries
    description: Add CLI query handlers (read operations) for an entity using Cobra
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files:
      - source: internal/context/inbound/cli/queries/entity.go.tmpl
        destination: internal/{{ .Context }}/inbound/cli/queries/{{ .Entity | lower }}.go
    hint: |
      CLI queries for {{ .Entity }} added.

      Created:
        internal/{{ .Context }}/inbound/cli/queries/{{ .Entity | lower }}.go — get, list cobra sub-commands

      NEXT STEPS:
        1. Implement handler logic (converters + usecase calls) in each RunE
        2. Wire in cmd/{{ .Context }}-cli/main.go:
             cliqueries.Setup{{ .Entity }}Queries(root, a)
        3. Test: go run ./cmd/{{ .Context }}-cli {{ .Entity | lower }} list --help

      NOTE: Setup{{ .Entity }}Queries merges into the existing "{{ .Entity | lower }}" sub-command group
      if Setup{{ .Entity }}Cmds already added it — no duplicate groups.

  - command: add_cli_handler
    description: Add both CLI command and query handlers for an entity
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files: []
    post_commands:
      - add_cli_commands
      - add_cli_queries
    hint: |
      Full CLI handler for {{ .Entity }} added (commands + queries).

      Wire both in cmd/{{ .Context }}-cli/main.go (see TODO in that file):
        clicommands.Setup{{ .Entity }}Cmds(root, a)
        cliqueries.Setup{{ .Entity }}Queries(root, a)

  # ──────────────────────────────────────────────
  # DOMAIN SERVICES — pure domain logic (no I/O)
  # ──────────────────────────────────────────────
  - command: add_domain_service
    description: Add a pure domain service (business rules, calculations, policies — no I/O)
    variables:
      - key: Context
        description: Bounded context name
      - key: Name
        description: Service name in PascalCase (e.g. Pricing, Eligibility)
    files:
      - source: internal/context/domain/services/name.go.tmpl
        destination: internal/{{ .Context }}/domain/services/{{ .Name | lower }}.go
    hint: |
      Domain service {{ .Name }} added.

      Created:
        internal/{{ .Context }}/domain/services/{{ .Name | lower }}.go — pure domain logic, no I/O

      CONVENTION:
        Domain services contain pure validation/policy functions (e.g. CanTransition, ValidateStock).
        State mutations belong on entity methods (e.g. order.MarkPaid()), not in the service.
        The app service calls the domain service to validate, then calls the entity method to mutate.

      TESTS FOR THIS LAYER:
        Domain services are pure functions — unit test them directly, no mocks needed.
        Test file: internal/{{ .Context }}/domain/services/{{ .Name | lower }}_test.go
        Generate stubs for each exported function:
          go-surgeon test -f internal/{{ .Context }}/domain/services/{{ .Name | lower }}.go -i <FunctionName>
        Cover: valid inputs, every error branch, boundary conditions.

  # ──────────────────────────────────────────────
  # PUBLISHER / CONSUMER — event ports and adapters
  # ──────────────────────────────────────────────
  - command: add_publisher_interface
    description: Add a publisher port interface (outbound) for an entity
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
      - key: Events
        description: "Comma-separated event suffixes (e.g. Added,StockChanged). If omitted, defaults to Created,Deleted. Each becomes a Publish{Entity}{Suffix} method."
        optional: true
    files:
      - source: internal/context/domain/publishers/entity/entity.go.tmpl
        destination: internal/{{ .Context }}/domain/publishers/{{ .Entity | lower }}pub/{{ .Entity | lower }}pub.go
    post_commands:
      - add_publisher_mock
    hint: |
      Publisher interface for {{ .Entity }} added.

      Created:
        internal/{{ .Context }}/domain/publishers/{{ .Entity | lower }}pub/{{ .Entity | lower }}pub.go — outbound port for {{ .Entity }} events

      WARNING — DUAL-WRITE RISK:
        Calling repo.Create() then publisher.Publish() is NOT atomic.
        If the broker fails after DB commit, the event is lost.
        For exactly-once semantics, implement the outbox pattern:
        write events to an outbox table inside the same DB transaction (UoW),
        then relay them to the broker via a separate poller/consumer.

  - command: add_publisher_mock
    description: Add a function-based mock for a publisher interface
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
      - key: Events
        description: "Comma-separated event suffixes (must match add_publisher_interface). Optional."
        optional: true
    files:
      - source: internal/context/domain/publishers/entity/entitytest/mock.go.tmpl
        destination: internal/{{ .Context }}/domain/publishers/{{ .Entity | lower }}pub/{{ .Entity | lower }}pubtest/mock.go
        on_conflict: force
    shell_commands:
      - command: "go-surgeon mock {{ .ModulePath }}/internal/{{ .Context }}/domain/publishers/{{ .Entity | lower }}pub.{{ .Entity }}Publisher --mock-name Mock{{ .Entity }}Publisher --file internal/{{ .Context }}/domain/publishers/{{ .Entity | lower }}pub/{{ .Entity | lower }}pubtest/mock.go"
    hint: |
      Mock for {{ .Entity }}Publisher added and generated via go-surgeon.

      Created:
        internal/{{ .Context }}/domain/publishers/{{ .Entity | lower }}pub/{{ .Entity | lower }}pubtest/mock.go

      Re-run after any interface change:
        scaffor execute go-hexagonal add_publisher_mock --set Context={{ .Context }} --set ModulePath={{ .ModulePath }} --set Entity={{ .Entity }}

  - command: add_publisher_adapter
    description: Add a concrete publisher adapter implementation (outbound)
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
      - key: Adapter
        description: Adapter technology name (e.g. kafka, sqs, nats)
      - key: Events
        description: "Comma-separated event suffixes (must match add_publisher_interface). Optional."
        optional: true
    files:
      - source: internal/context/outbound/adapter/backend.go.tmpl
        destination: internal/{{ .Context }}/outbound/{{ .Adapter }}/backend.go
        on_conflict: skip
      - source: internal/context/outbound/adapter/publisher_entity.go.tmpl
        destination: internal/{{ .Context }}/outbound/{{ .Adapter }}/publisher_{{ .Entity | lower }}.go
    shell_commands:
      - command: >-
          echo 'func (a *App) Set{{ .Entity }}Publisher(p {{ .Entity | lower }}pub.{{ .Entity }}Publisher) { a.{{ .Entity | lower }}Publisher = p }'
          | go-surgeon add-func --file internal/{{ .Context }}/app/{{ .Entity | lower }}.go
      - command: >-
          go-surgeon insert-call
          --file internal/{{ .Context }}/wire_{{ .Entity | lower }}.go
          --id wire{{ .Entity }}
          --call "{{ .Entity | lower }}Publisher := {{ .Adapter }}adapter.New{{ .Entity }}Publisher(deps.Backends.{{ .Adapter | title }}); a.Set{{ .Entity }}Publisher({{ .Entity | lower }}Publisher)"
          --position "after:Set{{ .Entity }}Repo"
    hint: |
      {{ .Entity }} publisher adapter ({{ .Adapter }}) added.

      Created:
        internal/{{ .Context }}/outbound/{{ .Adapter }}/backend.go               — shared Backend interface (skipped if already exists)
        internal/{{ .Context }}/outbound/{{ .Adapter }}/publisher_{{ .Entity | lower }}.go — publisher stub implementing {{ .Entity }}Publisher

      Auto-wired:
        Set{{ .Entity }}Publisher setter added to app/{{ .Entity | lower }}.go
        Publisher creation + injection inserted in wire_{{ .Entity | lower }}.go

      REMAINING MANUAL STEP:
        Add the publisher field to the App struct in app/config.go:
          {{ .Entity | lower }}Publisher {{ .Entity | lower }}pub.{{ .Entity }}Publisher

      The events/ directory is broker-agnostic. The broker (NATS, RabbitMQ, Kafka, SQS)
      is chosen when implementing the Backend interface in backend.go — see the
      examples in that file's TODO.

  - command: add_consumer_handler
    description: Add an inbound consumer handler for cross-context or local events
    variables:
      - key: Context
        description: Bounded context name (the LOCAL context that consumes the event)
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase (e.g. Account for AccountDeleted events)
      - key: SourceContext
        description: Bounded context that emits the event (may differ from Context for cross-context events, e.g. "accounts" when consuming AccountDeleted in catalog)
      - key: Event
        description: |
          Full event name in PascalCase (e.g. AccountDeleted). Used to reference the exact
          event type created by add_consumed_event (e.g. AccountDeletedEvent).
          Must match the Event variable passed to add_consumed_event.
          If omitted, falls back to {{ .Entity }}Event — likely wrong for named events.
        optional: true
    files:
      - source: internal/context/inbound/events/consumers/entity.go.tmpl
        destination: internal/{{ .Context }}/inbound/events/consumers/{{ .Entity | lower }}.go
      - source: internal/context/wire_consumer.go.tmpl
        destination: internal/{{ .Context }}/wire_{{ .Entity | lower }}_consumer.go
    hint: |
      {{ .Entity }} consumer handler added.

      Created:
        internal/{{ .Context }}/inbound/events/consumers/{{ .Entity | lower }}.go
        internal/{{ .Context }}/wire_{{ .Entity | lower }}_consumer.go — registers the consumer via RegisterConsumer in init()

      This consumer handles events from the {{ .SourceContext }} bounded context.
      It imports event types from pkg/{{ .SourceContext }}/events/v1/ and acts on the
      LOCAL {{ .Context }} context via local usecase interfaces (not {{ .SourceContext }} usecases).
      Wire from the composition root:
        consumer := consumers.New{{ .Entity }}Consumer(localCmds)

      IMPORTANT: for cross-context consumers (SourceContext != Context), the consumer
      must NOT import usecases from the source context. It should depend on LOCAL
      usecase interfaces and translate the foreign event into local domain operations.

      The events/ directory is broker-agnostic. The broker (NATS, RabbitMQ, Kafka, SQS)
      is chosen when implementing the Backend interface in backend.go — see the
      examples in that file's TODO.

      This command created TWO files:
        - the consumer handler (inbound/events/consumers/<entity>.go)
        - its wire file (wire_<entity>_consumer.go) that auto-registers via init()

      The wire file hooks the consumer into Setup() lifecycle — no manual wiring
      in init.go is needed. Fill in the TODO(scaffolding) markers in the wire
      file to connect the consumer to your broker of choice.

  # ──────────────────────────────────────────────
  # PUBLIC TYPES — API contracts
  # ──────────────────────────────────────────────
  - command: add_public_types
    description: Add public request/response types for an entity
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files:
      - source: pkg/context/http/v1/entity.go.tmpl
        destination: pkg/{{ .Context }}/http/v1/{{ .Entity | lower }}.go
    hint: |
      Public types for {{ .Entity }} added.

      Created:
        pkg/{{ .Context }}/http/v1/{{ .Entity | lower }}.go — CreateRequest, UpdateRequest, Response, ListResponse structs

      NEXT STEPS:
        1. Customize request/response fields to match your API design
        2. Add converters:
           scaffor execute go-hexagonal add_http_converter --set Context={{ .Context }} --set ModulePath={{ .ModulePath }} --set Entity={{ .Entity }}

  - command: add_consumed_event
    description: Add a consumed event type (events this context receives)
    variables:
      - key: Context
        description: Bounded context name
      - key: Event
        description: Event name in PascalCase (e.g. ProjectCreated)
      - key: SourceContext
        description: |
          Bounded context that emits this event. When set, the event type is created in
          pkg/{SourceContext}/events/v1 instead of pkg/{Context}/events/v1.
          Use this for cross-context events (e.g. AccountDeleted from the accounts context).
          Omit when consuming an event emitted by the same context.
        optional: true
    files:
      - source: pkg/context/events/v1/consumed_event.go.tmpl
        destination: "pkg/{{ if .SourceContext }}{{ .SourceContext }}{{ else }}{{ .Context }}{{ end }}/events/v1/{{ .Event | lower }}_consumed.go"
    hint: |
      Consumed event {{ .Event }} added.

      Created:
        pkg/{{ if .SourceContext }}{{ .SourceContext }}{{ else }}{{ .Context }}{{ end }}/events/v1/{{ .Event | lower }}_consumed.go — {{ .Event }}Event struct

      NOTE: event type lives in pkg/{{ if .SourceContext }}{{ .SourceContext }} (source context){{ else }}{{ .Context }}{{ end }}/events/v1.
      Consumers in this context import from that path.

      NEXT STEPS:
        1. Define the event fields
        2. Create an inbound queue consumer to handle this event:
           scaffor execute go-hexagonal add_consumer_handler --set Context={{ .Context }} --set Entity=... --set Event={{ .Event }} --set SourceContext={{ if .SourceContext }}{{ .SourceContext }}{{ else }}{{ .Context }}{{ end }}

      Typical next step:
        - add_consumer_handler — REQUIRED to actually receive and process this event.
          This command creates both the handler and its automatic boot-time wiring.
          Without it, the event type is declared but no consumer reads messages.

  - command: add_emitted_event
    description: Add an emitted event type (events this context publishes)
    variables:
      - key: Context
        description: Bounded context name
      - key: Event
        description: Event name in PascalCase (e.g. NotificationSent)
    files:
      - source: pkg/context/events/v1/emitted_event.go.tmpl
        destination: pkg/{{ .Context }}/events/v1/{{ .Event | lower }}_emitted.go
    hint: |
      Emitted event {{ .Event }} added to {{ .Context }}.

      Created:
        pkg/{{ .Context }}/events/v1/{{ .Event | lower }}_emitted.go — {{ .Event }}Event struct

      NEXT STEPS:
        1. Define the event fields
        2. Publish this event from the app service or outbound adapter

      Typical next step:
        - add_publisher_adapter — create the publisher that emits this event,
          wired to a message broker (NATS, RabbitMQ, Kafka, SQS).

  # ──────────────────────────────────────────────
  # MIGRATIONS
  # ──────────────────────────────────────────────
  - command: add_migration
    description: Add a numbered SQL migration file pair (up + down)
    variables:
      - key: Context
        description: Bounded context name
      - key: Adapter
        description: Adapter technology name (e.g. pg)
      - key: MigrationNumber
        description: Migration number with leading zeros (e.g. 001, 002)
      - key: MigrationSlug
        description: Migration description slug (e.g. create_projects, add_notification_table)
      - key: Destination
        description: "Override the migration directory (e.g. cmd/db-migrate/migrations). Defaults to internal/<Context>/outbound/<Adapter>/migrations when omitted."
        optional: true
    files:
      - source: internal/context/outbound/adapter/migrations/migration.up.sql.tmpl
        destination: "{{ if .Destination }}{{ .Destination }}{{ else }}internal/{{ .Context }}/outbound/{{ .Adapter }}/migrations{{ end }}/{{ .MigrationNumber }}_{{ .MigrationSlug }}.up.sql"
      - source: internal/context/outbound/adapter/migrations/migration.down.sql.tmpl
        destination: "{{ if .Destination }}{{ .Destination }}{{ else }}internal/{{ .Context }}/outbound/{{ .Adapter }}/migrations{{ end }}/{{ .MigrationNumber }}_{{ .MigrationSlug }}.down.sql"
    hint: |
      Migration {{ .MigrationNumber }}_{{ .MigrationSlug }} added.

      Created:
        {{ if .Destination }}{{ .Destination }}{{ else }}internal/{{ .Context }}/outbound/{{ .Adapter }}/migrations{{ end }}/{{ .MigrationNumber }}_{{ .MigrationSlug }}.up.sql
        {{ if .Destination }}{{ .Destination }}{{ else }}internal/{{ .Context }}/outbound/{{ .Adapter }}/migrations{{ end }}/{{ .MigrationNumber }}_{{ .MigrationSlug }}.down.sql

      NEXT STEPS:
        1. Write the CREATE/ALTER statements in the .up.sql file
        2. Write the corresponding DROP/REVERT in the .down.sql file
        3. Remember: all DDL must be idempotent (IF NOT EXISTS)

  # ──────────────────────────────────────────────
  # E2E TESTS
  # ──────────────────────────────────────────────
  - command: add_e2e_test
    description: Add an e2e API test file for an entity
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
    files:
      - source: tests/e2e-api/entity_test.go.tmpl
        destination: tests/e2e-api/{{ .Entity | lower }}_test.go
    hint: |
      E2E test placeholder for {{ .Entity }} added.

      Created:
        tests/e2e-api/{{ .Entity | lower }}_test.go

      TESTS FOR THIS LAYER:
        E2E tests hit real HTTP endpoints against a fully wired stack (testcontainers).
        Use the doGet/doPost/doPut/doDelete helpers from setup_test.go.
        Implement handlers before writing these tests.

        Required scenarios — implement all of these:
          - Full CRUD lifecycle (create → get → update → delete)
          - IDOR: access entity belonging to scope B from scope A's token → 404
          - Validation errors: missing required fields, invalid IDs → 400 with structured JSON
          - List: empty result returns {"items":[],"next_cursor":""} not null
          - List: pagination cursor advances correctly across pages
          - Action endpoints (if any): full state-machine lifecycle (e.g. place → pay → fulfill)

        Generate stubs for each handler after implementing them:
          go-surgeon test -f internal/{{ .Context }}/inbound/http/commands/{{ .Entity | lower }}.go -i create{{ .Entity }}Handler
          go-surgeon test -f internal/{{ .Context }}/inbound/http/queries/{{ .Entity | lower }}.go -i get{{ .Entity }}ByIDHandler

  # ──────────────────────────────────────────────
  # ADDITIONAL BINARIES
  # ──────────────────────────────────────────────
  - command: add_cmd
    description: Add an additional binary entry point (worker, migrator, etc.)
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Binary
        description: Binary name (e.g. worker, migrator, consumer)
      - key: NoContext
        description: "Set to \"true\" to generate a minimal main.go with no bounded-context import (e.g. for cmd/db-migrate, cmd/nats-setup). Omit or set to \"false\" to reuse internal/<Context>/config."
        optional: true
    files:
      - source: cmd/binary/main.go.tmpl
        destination: cmd/{{ .Binary }}/main.go
    hint: |
      Binary {{ .Binary }} added.

      Created:
        cmd/{{ .Binary }}/main.go — {{ if eq .NoContext "true" }}standalone entry point (no bounded-context import){{ else }}entry point reusing {{ .Context }} bounded context{{ end }}

      This binary has no HTTP/gRPC server — it's an empty entry point for you to wire.
      NEXT STEPS:
        {{ if eq .NoContext "true" -}}
        1. Implement the {{ .Binary }} logic directly in main.go (no context DI needed)
        2. Build: go build ./cmd/{{ .Binary }}
        {{- else -}}
        1. Wire dependencies from internal/{{ .Context }}/ as needed
        2. Build: go build ./cmd/{{ .Binary }}
        {{- end }}

  # ──────────────────────────────────────────────
  # SHARED PACKAGE — utility library under internal/pkg/
  # ──────────────────────────────────────────────
  - command: add_shared_package
    description: Add a shared utility package under internal/pkg/<Package>/ (no bounded-context layering)
    variables:
      - key: ModulePath
        description: Go module path (e.g. github.com/senhal-dev/senhal-core)
      - key: Package
        description: Package name in lowercase, matches the directory name (e.g. semver, ratelimit, jwtblacklist)
    files:
      - source: internal/pkg/shared/doc.go.tmpl
        destination: internal/pkg/{{ .Package | lower }}/doc.go
        on_conflict: skip
      - source: internal/pkg/shared/errors.go.tmpl
        destination: internal/pkg/{{ .Package | lower }}/errors.go
        on_conflict: skip
      - source: internal/pkg/shared/errors_test.go.tmpl
        destination: internal/pkg/{{ .Package | lower }}/errors_test.go
        on_conflict: skip
    hint: |
      Shared package {{ .Package | lower }} added at internal/pkg/{{ .Package | lower }}/.

      Created:
        internal/pkg/{{ .Package | lower }}/doc.go          — package doc + shared-package conventions
        internal/pkg/{{ .Package | lower }}/errors.go       — sentinel error starter (ErrInvalid)
        internal/pkg/{{ .Package | lower }}/errors_test.go  — smoke test (sentinel is non-nil, importable)

      CONVENTION:
        Shared packages are leaves in the import graph. Import allowed FROM:
          - any internal/<context>/ layer (domain/app/inbound/outbound)
          - any cmd/<binary>/
          - other internal/pkg/<name>/ packages (kept minimal, prefer zero)
        Import forbidden: internal/<context>/ from a shared package (shared packages
        cannot depend on bounded contexts).

      NEXT STEPS:
        1. Replace or extend the ErrInvalid sentinel with the real errors your package exports
           (or delete errors.go if the package has no sentinel errors).
        2. Add the package's real types and functions next to doc.go (new files as needed).
        3. Grow the tests: delete errors_test.go's placeholder when you have real coverage.
        4. Import from consumers: "{{ .ModulePath }}/internal/pkg/{{ .Package | lower }}"

  # ──────────────────────────────────────────────
  # COMPOSITE — full entity scaffold across all layers
  # ──────────────────────────────────────────────
  - command: add_entity
    description: Scaffold a complete entity across all hexagonal layers (domain, repo, service, app, handler, types, tests)
    variables:
      - key: Context
        description: Bounded context name
      - key: ModulePath
        description: Go module path
      - key: Entity
        description: Entity name in PascalCase
      - key: Adapter
        description: Adapter technology name (e.g. pg, redis, mongo)
    files: []
    post_commands:
      - add_domain_entity
      - add_repository_interface
      - add_usecase_interface
      - add_app_service
      - add_app_unit_test
      - add_app_service_contract_test
      - add_public_types
      - add_http_handler
      - add_e2e_test
      - add_repository_adapter
    hint: |
      Full entity {{ .Entity }} scaffolded across all layers of {{ .Context }}.

      WIRING (already done):
        internal/{{ .Context }}/wire_{{ .Entity | lower }}.go registers the entity's adapters
        AND inbound HTTP routes via init() — Setup() picks them up automatically.
        No edits to init.go needed. Handlers receive usecase interfaces, not *app.App.

      NEXT STEPS:
        1. Add the {{ .Entity | lower }}Repo field to the App struct in app/config.go
        2. Define {{ .Entity }} fields in domain/{{ .Entity | lower }}.go
        3. Customize repository and service interface methods
        4. Adjust SQL columns in the repository adapter to match your entity fields
        5. Implement the app service business logic
        6. Implement the HTTP handler and converters
        7. Write failing tests (red phase), then implement (green phase)

      IF YOU USE UnitOfWork:
        UoW is per-context, not per-entity — add_entity does NOT scaffold it.
        If a UoW already exists, wire the new entity's repo accessor into pgRepositories:
          go-surgeon create --object func --file internal/{{ .Context }}/outbound/{{ .Adapter }}/uow.go \
            -i pgRepositories.{{ .Entity }}s \
            --content 'func (r *pgRepositories) {{ .Entity }}s() {{ .Entity | lower }}.{{ .Entity }}Repository { return New{{ .Entity }}RepositoryTx(r.tx) }'
        Also add the method to the domain Repositories interface in domain/uow/uow.go.

test:
  - command: add_migration
    params:
      Context: catalog
      Adapter: pg
      MigrationNumber: "001"
      MigrationSlug: create_products
  - command: add_migration
    params:
      Context: catalog
      Adapter: pg
      MigrationNumber: "002"
      MigrationSlug: add_stock_column
      Destination: cmd/db-migrate/migrations
  - command: add_grpc_proto
    params:
      Context: catalog
      ModulePath: github.com/example/myapp

validate:
  - "test -f internal/catalog/outbound/pg/migrations/001_create_products.up.sql"
  - "test -f internal/catalog/outbound/pg/migrations/001_create_products.down.sql"
  - "test -f cmd/db-migrate/migrations/002_add_stock_column.up.sql"
  - "test -f cmd/db-migrate/migrations/002_add_stock_column.down.sql"
  - "test -f pkg/catalog/grpc/proto/catalog.proto"

shell_commands:
  - command: "goimports -w {{ .Files }}"
    pattern: "*.go"
